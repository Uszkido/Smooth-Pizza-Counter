<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Analytics — Pizza &amp; Ice Cream Club VMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --dark: #0b0c10;
            --bar: #0d0e14;
            --card: #1a1d27;
            --border: rgba(255, 255, 255, .06);
            --accent: #66fcf1;
            --accent2: #45a29e;
            --text: #c5c6c7;
            --pure: #fff;
            --green: #4ade80;
            --red: #ff4b2b;
            --yellow: #fbbf24;
        }

        html,
        body {
            height: 100%;
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        /* Top bar */
        .topbar {
            height: 54px;
            background: var(--bar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 14px;
            flex-shrink: 0
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none
        }

        .logo img {
            height: 26px;
            object-fit: contain
        }

        .logo .brand {
            font-size: 13px;
            font-weight: 700;
            color: var(--pure);
            white-space: nowrap
        }

        .topbar nav {
            margin-left: auto;
            display: flex;
            gap: 2px
        }

        .topbar nav a {
            padding: 6px 13px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            color: var(--text);
            transition: background .15s, color .15s
        }

        .topbar nav a:hover {
            background: rgba(255, 255, 255, .06);
            color: var(--pure)
        }

        .topbar nav a.active {
            color: var(--accent);
            background: rgba(102, 252, 241, .07)
        }

        .btn-logout {
            padding: 5px 13px;
            background: rgba(255, 75, 43, .1);
            border: 1px solid rgba(255, 75, 43, .2);
            border-radius: 8px;
            font-size: 12px;
            color: var(--red);
            text-decoration: none;
            transition: background .15s
        }

        .btn-logout:hover {
            background: rgba(255, 75, 43, .2)
        }

        /* Layout */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        .date-panel {
            width: 215px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .date-panel::-webkit-scrollbar {
            width: 3px
        }

        .date-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 2px
        }

        .panel-hdr {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
            padding: 0 4px
        }

        .date-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text);
            transition: background .12s
        }

        .date-item:hover {
            background: rgba(255, 255, 255, .04)
        }

        .date-item.active {
            background: rgba(102, 252, 241, .08);
            color: var(--pure)
        }

        .date-val {
            color: var(--accent);
            font-weight: 700
        }

        /* Charts area */
        .charts {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .charts::-webkit-scrollbar {
            width: 3px
        }

        .charts::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 2px
        }

        /* KPI row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px
        }

        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px
        }

        .kpi-val {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1
        }

        .kpi-lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text);
            margin-top: 6px
        }

        .kpi-card.yellow .kpi-val {
            color: var(--yellow)
        }

        .kpi-card.green .kpi-val {
            color: var(--green)
        }

        /* Records */
        .records {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            gap: 48px;
            align-items: center;
            flex-wrap: wrap
        }

        .rec {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .rec-lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text)
        }

        .rec-val {
            font-size: 22px;
            font-weight: 900;
            color: var(--yellow)
        }

        .rec-date {
            font-size: 11px;
            color: rgba(197, 198, 199, .4)
        }

        /* Chart cards */
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px
        }

        .chart-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px
        }

        .chart-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--pure)
        }

        .btn-csv {
            padding: 5px 12px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            font-size: 11px;
            color: var(--text);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: background .15s;
            cursor: pointer;
        }

        .btn-csv:hover {
            background: rgba(255, 255, 255, .1);
            color: var(--pure)
        }

        canvas {
            max-height: 200px
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <a class="logo" href="/">
                <img src="/static/pizza_club_logo.png" alt="" onerror="this.style.display='none'" />
                <span class="brand">Pizza &amp; Ice Cream Club</span>
            </a>
            <nav>
                <a href="/">📹 Dashboard</a>
                <a href="/analytics" class="active">📊 Analytics</a>
                {% if role == 'manager' %}<a href="/calibration">⚙ Settings</a>{% endif %}
            </nav>
            <a href="/logout" class="btn-logout">🔒 Logout</a>
        </div>

        <div class="content">
            <!-- Date panel -->
            <div class="date-panel">
                <div class="panel-hdr">📅 History</div>
                <div id="date-list"></div>
            </div>

            <!-- Charts -->
            <div class="charts">
                <!-- KPI -->
                <div class="kpi-row">
                    <div class="kpi-card">
                        <div class="kpi-val" id="kpi-sel">—</div>
                        <div class="kpi-lbl">Selected Total</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-val" id="kpi-avg">—</div>
                        <div class="kpi-lbl">Daily Average</div>
                    </div>
                    <div class="kpi-card yellow">
                        <div class="kpi-val" id="kpi-peak">—</div>
                        <div class="kpi-lbl">🏆 Best Hour</div>
                    </div>
                    <div class="kpi-card green">
                        <div class="kpi-val" id="kpi-rate">—</div>
                        <div class="kpi-lbl">Live Rate/hr</div>
                    </div>
                </div>
                <!-- Records -->
                <div class="records">
                    <div class="rec">
                        <div class="rec-lbl">🏆 Best Day Ever</div>
                        <div class="rec-val" id="best-val">—</div>
                        <div class="rec-date" id="best-date">—</div>
                    </div>
                    <div class="rec">
                        <div class="rec-lbl">📉 Quietest Day</div>
                        <div class="rec-val" id="worst-val" style="color:var(--text)">—</div>
                        <div class="rec-date" id="worst-date">—</div>
                    </div>
                </div>
                <!-- Hourly bar -->
                <div class="chart-card">
                    <div class="chart-hdr">
                        <div class="chart-title">📈 Hourly Breakdown — <span id="chart-date-lbl">—</span></div>
                        <a class="btn-csv" href="/api/export_csv">⬇ Export CSV</a>
                    </div>
                    <canvas id="bar-chart"></canvas>
                </div>
                <!-- Weekly line -->
                <div class="chart-card">
                    <div class="chart-hdr">
                        <div class="chart-title">📆 Last 7 Days</div>
                    </div>
                    <canvas id="line-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ACCENT = '#66fcf1', TEXT = '#c5c6c7';
        const gridOpts = { color: 'rgba(255,255,255,.05)' };
        const tickOpts = { color: TEXT, font: { size: 10 } };
        const baseOpts = {
            responsive: true, maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: { x: { grid: gridOpts, ticks: tickOpts }, y: { grid: gridOpts, ticks: tickOpts, beginAtZero: true } }
        };

        let barChart, lineChart, allLogs = {};

        function initCharts() {
            barChart = new Chart(document.getElementById('bar-chart').getContext('2d'), {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: 'rgba(102,252,241,.65)', borderRadius: 4, borderSkipped: false }] },
                options: baseOpts
            });
            lineChart = new Chart(document.getElementById('line-chart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: [], datasets: [{
                        data: [], borderColor: ACCENT, backgroundColor: 'rgba(102,252,241,.07)',
                        pointBackgroundColor: ACCENT, pointRadius: 4, tension: .4, fill: true
                    }]
                },
                options: baseOpts
            });
        }

        function showDate(date) {
            document.querySelectorAll('.date-item').forEach(el => el.classList.toggle('active', el.dataset.date === date));
            document.getElementById('chart-date-lbl').textContent = date;
            const day = allLogs[date] || {}, hourly = day.hourly || {};
            document.getElementById('kpi-sel').textContent = day.total ?? 0;
            const labels = [], values = []; let maxV = 0, maxH = '—';
            for (let i = 0; i < 24; i++) {
                const h = String(i).padStart(2, '0'), v = hourly[h] || 0;
                labels.push(`${h}:00`); values.push(v);
                if (v > maxV) { maxV = v; maxH = `${h}:00`; }
            }
            barChart.data.labels = labels; barChart.data.datasets[0].data = values; barChart.update();
            document.getElementById('kpi-peak').textContent = maxH;
        }

        async function loadData() {
            try {
                const d = await (await fetch('/api/stats')).json();
                allLogs = d.full_history || {};
                const rec = d.records || {}, weekly = d.weekly || {};
                document.getElementById('kpi-avg').textContent = rec.daily_avg ?? '—';
                document.getElementById('kpi-rate').textContent = `${d.pizza_rate ?? 0}/hr`;
                document.getElementById('best-val').textContent = `${rec.best_val ?? '—'} 🍕`;
                document.getElementById('best-date').textContent = rec.best_day ?? '—';
                document.getElementById('worst-val').textContent = `${rec.worst_val ?? '—'} 🍕`;
                document.getElementById('worst-date').textContent = rec.worst_day ?? '—';

                if (weekly.labels) {
                    lineChart.data.labels = weekly.labels.map(l => l.slice(5));
                    lineChart.data.datasets[0].data = weekly.values; lineChart.update();
                }
                const dates = Object.keys(allLogs).sort((a, b) => b.localeCompare(a));
                document.getElementById('date-list').innerHTML = dates.map(dt =>
                    `<div class="date-item" data-date="${dt}" onclick="showDate('${dt}')">
        <span>${dt}</span><span class="date-val">${allLogs[dt]?.total ?? 0}</span>
       </div>`).join('');
                if (dates.length) showDate(dates[0]);
            } catch (e) { console.error(e) }
        }

        initCharts(); loadData();
    </script>
</body>

</html>
